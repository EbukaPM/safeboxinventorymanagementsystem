<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeBox Energy IMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
    <style>
      :root {
        /* Brand colors */
        --brand-primary: #1B5E3B;
        --brand-hover: #154D30;
        --brand-light: #E8F5EE;
        --brand-accent: #F5A623;
        --brand-accent-light: #FEF8E7;

        /* Sidebar */
        --sidebar-bg: #0F3D26;
        --sidebar-text: #C8DDD4;
        --sidebar-active-bg: rgba(255,255,255,0.12);
        --sidebar-active-text: #FFFFFF;
        --sidebar-section-text: #6B8F7A;

        /* Backgrounds */
        --color-background-primary: #FFFFFF;
        --color-background-secondary: #F4F6F5;
        --color-background-tertiary: #EEF1EF;

        /* Text */
        --color-text-primary: #1A2530;
        --color-text-secondary: #5F6B7A;
        --color-text-tertiary: #9CA8B4;

        /* Borders */
        --color-border-secondary: #E2E8E4;
        --color-border-tertiary: #EEF1EF;

        /* Radius */
        --border-radius-md: 6px;
        --border-radius-lg: 10px;

        /* Typography */
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      input, select, textarea, button { font-family: inherit; }
      a { text-decoration: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
